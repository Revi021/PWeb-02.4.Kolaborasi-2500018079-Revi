<!DOCTYPE html>
<html>
<head>
    <title>Konversi Nilai Angka ke Huruf</title>
</head>
<body>

    <h2>Konversi Nilai Angka ke Huruf</h2>

    <input type="number" id="nilai" placeholder="Masukkan nilai (0-100)">
    <button onclick="cekNilai()">Cek Nilai</button>

    <p id="hasil"></p>

    <script>
        function cekNilai() {
            var nilai = document.getElementById("nilai").value;
            var huruf;

            if (nilai >= 0 && nilai <= 20) {
                huruf = "E";
            } else if (nilai >= 21 && nilai <= 39) {
                huruf = "D";
            } else if (nilai >= 40 && nilai <= 64) {
                huruf = "C";
            } else if (nilai >= 65 && nilai <= 79) {
                huruf = "B";
            } else if (nilai >= 80 && nilai <= 100) {
                huruf = "A";
            } else {
                huruf = "Nilai tidak valid";
            }

            document.getElementById("hasil").innerHTML = "Nilai Huruf: " + huruf;
        }
    </script>

</body>
</html>
